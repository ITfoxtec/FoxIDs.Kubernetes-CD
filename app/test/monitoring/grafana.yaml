# https://artifacthub.io/packages/helm/grafana/grafana
# https://grafana.com/docs/grafana-cloud/monitor-infrastructure/kubernetes-monitoring/configuration/config-other-methods/argocd-config/
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: grafana
    targetRevision: 9.2.1
    helm:
      parameters:
      - name: "adminPassword"
        value: "admin"
      - name: "service.type"
        value: "ClusterIP"
      - name: "externalServices.prometheus.host"
        value: "http://prometheus-server.monitoring.svc.cluster.local"
  destination:
    name: in-cluster
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true