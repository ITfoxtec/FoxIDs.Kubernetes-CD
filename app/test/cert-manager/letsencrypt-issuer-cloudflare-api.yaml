apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: 
  name: letsencrypt-api-staging 
spec:
  acme:   
    server: https://acme-staging-v02.api.letsencrypt.org/directory 
    email: ${email} 
    privateKeySecretRef:     
     name: letsencrypt-api-staging 
    solvers:
      - dns01:
          cloudflare:
            email: ${cloudflare_email}
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: 
  name: letsencrypt-api-production 
spec:
  acme:   
    server: https://acme-v02.api.letsencrypt.org/directory 
    email: ${email}
    privateKeySecretRef:     
      name: letsencrypt-api-production 
    solvers:
      - dns01:
          cloudflare:
            email: ${cloudflare_email}
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token