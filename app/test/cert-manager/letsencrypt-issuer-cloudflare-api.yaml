apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: 
  name: letsencrypt-api-staging 
  namespace: cert-manager
spec:
  acme:   
    server: https://acme-staging-v02.api.letsencrypt.org/directory 
    email: {{letsencrypt_email}}
    privateKeySecretRef:     
     name: letsencrypt-api-staging 
    solvers:
      - dns01:
          cloudflare:
            email: {{cloudflare_email}}
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata: 
  name: letsencrypt-api-production 
  namespace: cert-manager
spec:
  acme:   
    server: https://acme-v02.api.letsencrypt.org/directory 
    email: {{.letsencrypt_email}}
    privateKeySecretRef:     
      name: letsencrypt-api-production 
    solvers:
      - dns01:
          cloudflare:
            email: {{.cloudflare_email}}
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token