apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meta-application
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
  - path: app/test
    repoURL: https://github.com/ITfoxtec/FoxIDs.Kubernetes-CD.git
    targetRevision: HEAD
    directory:
      include: application.yaml
      exclude: meta-application.yaml
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
