# https://artifacthub.io/packages/helm/ingress-nginx/ingress-nginx
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://kubernetes.github.io/ingress-nginx'
    chart: ingress-nginx
    targetRevision: 9.2.1
    helm:
      parameters:
      - name: "controller.service.externalTrafficPolicy"
        value: "Local"
      - name: "controller.service.annotations.loadbalancer.openstack.org/proxy-protocol"
        value: "v2"
      - name: "controller.service.annotations.loadbalancer.ovhcloud.com/flavor"
        value: "small"
      - name: "controller.service.annotations.loadbalancer.openstack.org/enable-health-monitor"
        value: false
      - name: "controller.config.use-proxy-protocol"
        value: true
      - name: "controller.config.real-ip-header"
        value: "proxy_protocol"
      - name: "controller.config.proxy-real-ip-cidr"
        value: ${subnet_list}
  destination:
    name: in-cluster
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true