apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: foxids-application
    namespace: argocd
spec:
    source:
        repoURL: https://github.com/ITfoxtec/FoxIDs.K8s
        path: environments/prod/foxids
        targetRevision: main
    destination:
        server: https://kubernetes.default.svc
        namespace: foxids
    syncPolicy:
        syncOptions:
        - CreateNamespace = true
        automated:
            selfHeal: true
            prune: true
      