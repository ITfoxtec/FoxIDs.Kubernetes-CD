apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: meta-application
  namespace: argocd
spec:
  project: default
  sources:
  - path: environments/test/istio
    repoURL: https://github.com/ITfoxtec/FoxIDs.Kubernetes-CD.git
    targetRevision: HEAD
  - path: environments/test/monitoring
    repoURL: https://github.com/ITfoxtec/FoxIDs.Kubernetes-CD.git
    targetRevision: HEAD
  - path: environments/test/myapp
    repoURL: https://github.com/ITfoxtec/FoxIDs.Kubernetes-CD.git
    targetRevision: HEAD
    directory:
      include: application.yaml
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
