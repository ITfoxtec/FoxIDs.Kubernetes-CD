# https://artifacthub.io/packages/helm/rancher-stable/rancher
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://releases.rancher.com/server-charts/latest'
    chart: rancher
    targetRevision: 2.11.2
  destination:
    name: in-cluster
    namespace: cattle-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true