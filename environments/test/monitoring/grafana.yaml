# https://artifacthub.io/packages/helm/grafana/grafana
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: grafana
    targetRevision: 27.16.0
    helm:
      parameters:
      - name: "adminPassword"
        value: "admin"
      - name: "service.type"
        value: "ClusterIP"
  destination:
    name: in-cluster
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true