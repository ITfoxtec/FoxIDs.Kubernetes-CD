apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: letsencrypt-kustomize
namespace: cert-manager
resources:
  - https://github.com/ITfoxtec/FoxIDs.Kubernetes-CD/app/test/cert-manager/
patches:
  - target:
      kind: ClusterIssuer
      name: letsencrypt-api-staging
    patch: |-
      - op: replace
        path: /spec/acme/email
        value: "${letsencrypt_email}"